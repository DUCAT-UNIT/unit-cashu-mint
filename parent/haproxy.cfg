# HAProxy Configuration for Nitro Enclave TCP Passthrough
#
# This configuration provides Layer 4 (TCP) load balancing from the internet
# to the Nitro Enclave. TLS is NOT terminated here - encrypted bytes are
# passed directly to the enclave where Nginx handles TLS termination.
#
# Traffic flow:
#   Internet :443 -> HAProxy (TCP mode) -> vsock:16:8443 -> Enclave Nginx
#
# The parent instance CANNOT see plaintext HTTP traffic.

global
    # Run as non-root user
    user haproxy
    group haproxy

    # Logging to syslog
    log /dev/log local0
    log /dev/log local1 notice

    # Security settings
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s

    # Process settings
    daemon
    maxconn 4096

    # SSL/TLS settings (for health checks only, not for termination)
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    log global
    mode tcp
    option tcplog
    option dontlognull

    # Timeouts
    timeout connect 10s
    timeout client  60s
    timeout server  60s

    # Retry settings
    retries 3
    option redispatch

# =============================================================================
# Frontend: Internet-facing HTTPS listener
# =============================================================================
frontend https_in
    # Listen on all interfaces, port 443
    bind *:443

    # TCP mode - no TLS termination
    mode tcp

    # Log client IP
    option tcplog

    # TCP connection limits
    maxconn 2000

    # Use enclave backend
    default_backend enclave_https

# =============================================================================
# Backend: Nitro Enclave via vsock
# =============================================================================
backend enclave_https
    mode tcp

    # Balance method (single server, but future-proofed)
    balance roundrobin

    # Enclave server via vsock
    # CID 16 is assigned to the enclave, port 8443 is Nginx TLS listener
    # Note: HAProxy vsock support requires HAProxy 2.4+ with vsock patch
    # Alternative: Use socat bridge (see vsock-bridge.service)
    server enclave 127.0.0.1:8443 check inter 5s fall 3 rise 2

    # Connection settings
    option tcp-check

# =============================================================================
# Stats endpoint (optional, for monitoring)
# =============================================================================
frontend stats
    bind 127.0.0.1:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:CHANGE_THIS_PASSWORD

# =============================================================================
# Health check endpoint
# Allows load balancers to verify the instance is healthy
# =============================================================================
frontend health
    bind *:8080
    mode http
    monitor-uri /health
