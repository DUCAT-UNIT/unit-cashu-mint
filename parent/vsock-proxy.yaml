# vsock-proxy allowlist for Nitro Enclave
# This file should be placed at /etc/nitro_enclaves/vsock-proxy.yaml

allowlist:
  # PostgreSQL (internal)
  - {address: 127.0.0.1, port: 5432}
  - {address: localhost, port: 5432}

  # Bitcoin/Runes APIs - Mainnet
  - {address: mempool.space, port: 443}
  - {address: ordinals.com, port: 443}

  # Bitcoin/Runes APIs - Testnet
  - {address: testnet.ordinals.com, port: 443}

  # Bitcoin/Runes APIs - Mutinynet (signet)
  - {address: mutinynet.com, port: 443}
  - {address: ord-mutinynet.ducatprotocol.com, port: 443}

  # KMS endpoints (all regions for flexibility)
  - {address: kms.us-east-1.amazonaws.com, port: 443}
  - {address: kms.us-east-2.amazonaws.com, port: 443}
  - {address: kms.us-west-1.amazonaws.com, port: 443}
  - {address: kms.us-west-2.amazonaws.com, port: 443}
  - {address: kms.eu-west-1.amazonaws.com, port: 443}
  - {address: kms.eu-central-1.amazonaws.com, port: 443}
  - {address: kms.ap-northeast-1.amazonaws.com, port: 443}
  - {address: kms.ap-southeast-1.amazonaws.com, port: 443}
