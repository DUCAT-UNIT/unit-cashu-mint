name: GCP Confidential Space Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'migrations/**'
      - 'gcp-confidential-space/**'
      - 'scripts/gcp-confidential-space-*.mjs'
      - 'terraform/gcp/**'
      - 'package*.json'
      - 'tsconfig.json'
      - '.github/workflows/gcp-confidential-space-release.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Terraform environment name, for example dev or prod.
        required: true
        default: dev
        type: string
      domain_name:
        description: Optional mint domain override. Defaults to vars.GCP_MINT_DOMAIN_NAME.
        required: false
        default: ''
        type: string
      terraform_apply:
        description: Apply Terraform and restart the Confidential Space instance.
        required: true
        default: true
        type: boolean
      restart_instance:
        description: Stop/start the Confidential Space VM after Terraform apply.
        required: true
        default: true
        type: boolean

concurrency:
  group: gcp-confidential-space-${{ inputs.environment || vars.GCP_DEPLOY_ENVIRONMENT || 'dev' }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  attestations: write

env:
  NODE_VERSION: '22'
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  GCP_ZONE: ${{ vars.GCP_ZONE || 'us-central1-a' }}
  ENVIRONMENT_NAME: ${{ inputs.environment || vars.GCP_DEPLOY_ENVIRONMENT || 'dev' }}
  DOMAIN_NAME: ${{ inputs.domain_name || vars.GCP_MINT_DOMAIN_NAME }}
  ARTIFACT_REGISTRY_LOCATION: ${{ vars.GCP_ARTIFACT_REGISTRY_LOCATION || vars.GCP_REGION || 'us-central1' }}
  ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY || 'ducat-mint' }}
  ARTIFACT_REGISTRY_IMAGE: ${{ vars.GCP_ARTIFACT_REGISTRY_IMAGE || 'mint-server' }}
  CLOUD_BUILD_SOURCE_BUCKET: ${{ vars.GCP_CLOUD_BUILD_SOURCE_BUCKET }}
  TF_STATE_BUCKET: ${{ vars.GCP_TF_STATE_BUCKET }}
  TF_STATE_PREFIX: ${{ vars.GCP_TF_STATE_PREFIX || format('mint-server/{0}', inputs.environment || vars.GCP_DEPLOY_ENVIRONMENT || 'dev') }}
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
  TF_VAR_region: ${{ vars.GCP_REGION || 'us-central1' }}
  TF_VAR_zone: ${{ vars.GCP_ZONE || 'us-central1-a' }}
  TF_VAR_environment: ${{ inputs.environment || vars.GCP_DEPLOY_ENVIRONMENT || 'dev' }}
  TF_VAR_domain_name: ${{ inputs.domain_name || vars.GCP_MINT_DOMAIN_NAME }}
  TF_VAR_tls_email: ${{ vars.GCP_TLS_EMAIL }}
  TF_VAR_repo_url: ${{ github.server_url }}/${{ github.repository }}.git
  TF_VAR_repo_ref: ${{ github.sha }}
  TF_VAR_deployment_mode: confidential-space
  TF_VAR_confidential_space_image_family: ${{ vars.GCP_CONFIDENTIAL_SPACE_IMAGE_FAMILY || 'confidential-space' }}
  TF_VAR_confidential_instance_type: ${{ vars.GCP_CONFIDENTIAL_INSTANCE_TYPE || 'SEV' }}
  TF_VAR_machine_type: ${{ vars.GCP_CONFIDENTIAL_MACHINE_TYPE || 'n2d-standard-4' }}
  TF_VAR_confidential_space_caddy_acme_storage_enabled: ${{ vars.GCP_CADDY_ACME_STORAGE_ENABLED || 'true' }}
  TF_VAR_confidential_space_caddy_acme_secret_id: ${{ vars.GCP_CADDY_ACME_SECRET_ID || '' }}
  TF_VAR_confidential_space_caddy_acme_sync_interval_seconds: ${{ vars.GCP_CADDY_ACME_SYNC_INTERVAL_SECONDS || '60' }}
  TF_VAR_confidential_space_caddy_acme_max_bytes: ${{ vars.GCP_CADDY_ACME_MAX_BYTES || '60000' }}
  TF_VAR_mint_env_secret_id: ${{ vars.GCP_MINT_ENV_SECRET_ID || 'ducat-mint-env' }}
  TF_VAR_create_artifact_registry_repository: ${{ vars.GCP_CREATE_ARTIFACT_REGISTRY_REPOSITORY || 'false' }}
  TF_VAR_artifact_registry_location: ${{ vars.GCP_ARTIFACT_REGISTRY_LOCATION || vars.GCP_REGION || 'us-central1' }}
  TF_VAR_artifact_registry_repository_id: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY || 'ducat-mint' }}
  TF_VAR_artifact_registry_image_name: ${{ vars.GCP_ARTIFACT_REGISTRY_IMAGE || 'mint-server' }}
  TF_VAR_managed_postgres_enabled: ${{ vars.GCP_MANAGED_POSTGRES_ENABLED || 'true' }}
  TF_VAR_managed_postgres_database_version: ${{ vars.GCP_MANAGED_POSTGRES_DATABASE_VERSION || 'POSTGRES_16' }}
  TF_VAR_managed_postgres_tier: ${{ vars.GCP_MANAGED_POSTGRES_TIER || 'db-custom-1-3840' }}
  TF_VAR_managed_postgres_disk_size_gb: ${{ vars.GCP_MANAGED_POSTGRES_DISK_SIZE_GB || '20' }}
  TF_VAR_managed_postgres_deletion_protection: ${{ vars.GCP_MANAGED_POSTGRES_DELETION_PROTECTION || 'true' }}
  TF_VAR_db_name: ${{ vars.GCP_MINT_DB_NAME || 'mintdb' }}
  TF_VAR_db_user: ${{ vars.GCP_MINT_DB_USER || 'mintuser' }}
  TF_VAR_db_sslmode: ${{ vars.GCP_MINT_DB_SSLMODE || 'disable' }}
  TF_VAR_db_password: ${{ secrets.GCP_MINT_DB_PASSWORD }}
  TF_VAR_manage_project_services: ${{ vars.GCP_MANAGE_PROJECT_SERVICES || 'true' }}
  TF_VAR_audit_monitoring_enabled: ${{ vars.GCP_AUDIT_MONITORING_ENABLED || 'true' }}
  TF_VAR_audit_alert_email: ${{ vars.GCP_AUDIT_ALERT_EMAIL || '' }}
  TF_VAR_audit_log_archive_bucket_name: ${{ vars.GCP_AUDIT_LOG_ARCHIVE_BUCKET_NAME || '' }}
  TF_VAR_audit_log_archive_location: ${{ vars.GCP_AUDIT_LOG_ARCHIVE_LOCATION || vars.GCP_REGION || 'us-central1' }}
  TF_VAR_audit_log_retention_days: ${{ vars.GCP_AUDIT_LOG_RETENTION_DAYS || '365' }}
  TF_VAR_audit_log_archive_retention_locked: ${{ vars.GCP_AUDIT_LOG_ARCHIVE_RETENTION_LOCKED || 'false' }}
  TF_VAR_audit_data_access_logs_enabled: ${{ vars.GCP_AUDIT_DATA_ACCESS_LOGS_ENABLED || 'false' }}
  TF_VAR_audit_monitor_reader_service_account_email: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || vars.GCP_DEPLOY_ENVIRONMENT || 'dev' }}
    outputs:
      configured: ${{ steps.config.outputs.configured }}

    env:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_DEPLOY_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

    steps:
      - name: Check deploy configuration
        id: config
        run: |
          set -euo pipefail
          missing=()
          for name in \
            GCP_PROJECT_ID \
            DOMAIN_NAME \
            TF_STATE_BUCKET \
            TF_VAR_tls_email \
            TF_VAR_db_password \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_DEPLOY_SERVICE_ACCOUNT; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            {
              echo "## GCP Confidential Space release not configured"
              echo ""
              echo "Missing required repository/environment configuration:"
              for name in "${missing[@]}"; do
                echo "- \`${name}\`"
              done
              echo ""
              echo "The deploy job was skipped without touching GCP."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"
          echo "GCP Confidential Space release configuration is present." >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Build, Deploy, Attest
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.configured == 'true'
    environment: ${{ inputs.environment || vars.GCP_DEPLOY_ENVIRONMENT || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static checks
        run: |
          set -euo pipefail
          npm run lint
          npm run build
          node --check scripts/gcp-confidential-space-build.mjs
          node --check scripts/gcp-confidential-space-attest.mjs
          node --check scripts/gcp-confidential-space-caddy-storage.mjs
          bash -n gcp-confidential-space/entrypoint.sh

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          token_format: access_token
          create_credentials_file: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Build Confidential Space image
        id: build_image
        env:
          GCP_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          set -euo pipefail
          extra_args=()
          if [[ -n "${CLOUD_BUILD_SOURCE_BUCKET:-}" ]]; then
            extra_args+=(--bucket "$CLOUD_BUILD_SOURCE_BUCKET")
          fi
          node scripts/gcp-confidential-space-build.mjs \
            --project "$GCP_PROJECT_ID" \
            --location "$ARTIFACT_REGISTRY_LOCATION" \
            --repository "$ARTIFACT_REGISTRY_REPOSITORY" \
            --image "$ARTIFACT_REGISTRY_IMAGE" \
            --tag "$GITHUB_SHA" \
            "${extra_args[@]}"

      - name: Authenticate Docker to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Attest image build provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.build_image.outputs.image_subject_name }}
          subject-digest: ${{ steps.build_image.outputs.image_digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Terraform init
        run: |
          set -euo pipefail
          cat > terraform/gcp/backend.tf <<'EOF'
          terraform {
            backend "gcs" {}
          }
          EOF
          terraform -chdir=terraform/gcp init \
            -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=${TF_STATE_PREFIX}"

      - name: Terraform validate
        run: |
          set -euo pipefail
          terraform -chdir=terraform/gcp fmt -check
          terraform -chdir=terraform/gcp validate

      - name: Terraform plan
        env:
          TF_VAR_confidential_space_image_reference: ${{ steps.build_image.outputs.confidential_space_image_reference }}
          TF_VAR_confidential_space_image_digest: ${{ steps.build_image.outputs.confidential_space_image_digest }}
        run: |
          set -euo pipefail
          terraform -chdir=terraform/gcp plan -input=false -out=tfplan

      - name: Terraform apply
        if: github.event_name == 'push' || inputs.terraform_apply == true
        run: terraform -chdir=terraform/gcp apply -input=false -auto-approve tfplan

      - name: Restart Confidential Space instance
        if: github.event_name == 'push' || (inputs.terraform_apply == true && inputs.restart_instance == true)
        run: |
          set -euo pipefail
          instance_name="ducat-mint-${ENVIRONMENT_NAME}-confidential-space"
          gcloud compute instances stop "$instance_name" \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_ZONE" \
            --quiet
          gcloud compute instances start "$instance_name" \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_ZONE" \
            --quiet

      - name: Wait for mint health
        if: github.event_name == 'push' || inputs.terraform_apply == true
        run: |
          set -euo pipefail
          for attempt in {1..60}; do
            if curl -fsS --max-time 5 "https://${DOMAIN_NAME}/health"; then
              echo
              exit 0
            fi
            echo "health check attempt ${attempt}/60 failed"
            sleep 10
          done
          exit 1

      - name: Generate deployment security attestation
        if: github.event_name == 'push' || inputs.terraform_apply == true
        id: deploy_attestation
        env:
          GCP_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          CONFIDENTIAL_SPACE_IMAGE_REFERENCE: ${{ steps.build_image.outputs.confidential_space_image_reference }}
          CONFIDENTIAL_SPACE_IMAGE_DIGEST: ${{ steps.build_image.outputs.confidential_space_image_digest }}
        run: |
          set -euo pipefail
          node scripts/gcp-confidential-space-attest.mjs \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --zone "$GCP_ZONE" \
            --environment "$ENVIRONMENT_NAME" \
            --domain "$DOMAIN_NAME" \
            --output-dir attestations
          cat attestations/gcp-confidential-space-deployment-attestation.md >> "$GITHUB_STEP_SUMMARY"

      - name: Attest deployment security predicate
        if: github.event_name == 'push' || inputs.terraform_apply == true
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.build_image.outputs.image_subject_name }}
          subject-digest: ${{ steps.build_image.outputs.image_digest }}
          predicate-type: https://ducatprotocol.com/attestations/gcp-confidential-space-release/v1
          predicate-path: attestations/gcp-confidential-space-deployment-attestation.json
          push-to-registry: true
          create-storage-record: false

      - name: Upload deployment attestation artifacts
        if: github.event_name == 'push' || inputs.terraform_apply == true
        uses: actions/upload-artifact@v4
        with:
          name: gcp-confidential-space-deployment-attestation
          path: |
            attestations/gcp-confidential-space-deployment-attestation.json
            attestations/gcp-confidential-space-deployment-attestation.json.sha256
            attestations/gcp-confidential-space-deployment-attestation.md
          retention-days: 90
